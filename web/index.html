<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheSmith - Foreign Connection Audit</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
        h1 { color: #1a1a2e; }
        .upload-area { background: white; border: 2px dashed #ccc; border-radius: 8px; padding: 40px; text-align: center; margin: 20px 0; }
        .upload-area:hover { border-color: #4a90d9; }
        input[type="file"] { margin: 10px 0; }
        button { background: #4a90d9; color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #357abd; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin: 20px 0; padding: 15px; border-radius: 4px; display: none; }
        #status.processing { background: #fff3cd; display: block; }
        #status.complete { background: #d4edda; display: block; }
        #status.error { background: #f8d7da; display: block; }
        #results { margin: 20px 0; }
        pre { background: white; padding: 15px; border-radius: 4px; overflow-x: auto; max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>TheSmith</h1>
    <p>Foreign Connection Audit Report - Upload an Entra sign-in log file (JSON or CSV) to analyze.</p>

    <div class="upload-area">
        <h3>Upload Entra Sign-In Log</h3>
        <input type="file" id="fileInput" accept=".json,.csv">
        <br>
        <button id="uploadBtn" onclick="uploadFile()">Analyze</button>
    </div>

    <div id="status"></div>
    <div id="results"></div>

    <script>
        async function uploadFile() {
            var fileInput = document.getElementById('fileInput');
            var statusDiv = document.getElementById('status');
            var resultsDiv = document.getElementById('results');
            var btn = document.getElementById('uploadBtn');

            if (!fileInput.files.length) {
                alert('Please select a file first.');
                return;
            }

            btn.disabled = true;
            statusDiv.className = 'processing';
            statusDiv.textContent = 'Uploading and processing...';
            resultsDiv.innerHTML = '';

            var formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                var uploadRes = await fetch('/upload', { method: 'POST', body: formData });
                var uploadData = await uploadRes.json();

                if (!uploadRes.ok) throw new Error(uploadData.error || 'Upload failed');

                // Poll for status
                var done = false;
                while (!done) {
                    await new Promise(function(r) { setTimeout(r, 1000); });
                    var statusRes = await fetch('/status');
                    var statusData = await statusRes.json();

                    if (statusData.status === 'complete') {
                        done = true;
                        statusDiv.className = 'complete';
                        statusDiv.textContent = 'Processing complete!';

                        var resultsRes = await fetch('/results');
                        var resultsData = await resultsRes.json();
                        resultsDiv.innerHTML = '<h3>Results</h3><pre>' +
                            JSON.stringify(resultsData, null, 2) + '</pre>';
                    } else if (statusData.status === 'error') {
                        done = true;
                        throw new Error(statusData.error || 'Processing failed');
                    } else {
                        var pct = statusData.totalRows > 0
                            ? Math.round((statusData.progress / statusData.totalRows) * 100)
                            : 0;
                        statusDiv.textContent = 'Processing... ' + statusData.progress +
                            ' / ' + statusData.totalRows + ' rows (' + pct + '%)';
                    }
                }
            } catch (err) {
                statusDiv.className = 'error';
                statusDiv.textContent = 'Error: ' + err.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
